        const getUpcomingMeetings = (monthKey, mData) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(today);
            target.setDate(today.getDate() + 2);
            const found = [];
            const [yr, mo] = monthKey.split('-').map(Number);
            const days = new Date(yr, mo, 0).getDate();
            for (let d = 1; d <= days; d++) {
                const dt = new Date(yr, mo - 1, d);
                dt.setHours(0, 0, 0, 0);
                if (dt.getDay() === 3 && dt.getTime() === target.getTime()) {
                    found.push({ date: dt, dateStr: dt.toLocaleDateString('en-NG', { weekday: 'long', day: 'numeric', month: 'long' }), label: 'CDS Meeting' });
                }
            }
            if (mData && mData.sensitizationDate) {
                const sd = new Date(mData.sensitizationDate);
                sd.setHours(0, 0, 0, 0);
                if (sd.getTime() === target.getTime()) {
                    found.push({ date: sd, dateStr: sd.toLocaleDateString('en-NG', { weekday: 'long', day: 'numeric', month: 'long' }), label: 'Sensitization' });
                }
            }
            if (mData && mData.manualMeetings) {
                mData.manualMeetings.forEach(m => {
                    const md = new Date(m.date);
                    md.setHours(0, 0, 0, 0);
                    if (md.getTime() === target.getTime()) {
                        found.push({ date: md, dateStr: md.toLocaleDateString('en-NG', { weekday: 'long', day: 'numeric', month: 'long' }), label: m.type === 'sensitization' ? 'Sensitization' : 'CDS Meeting' });
                    }
                });
            }
            return found;
        };

        const generateReceiptHash = (receiptNumber, memberId, amount, confirmedDate, confirmedBy) => {
            const raw = (receiptNumber||'') + '|' + (memberId||'') + '|' + (amount||0) + '|' + (confirmedDate||'') + '|' + (confirmedBy||'') + '|' + RECEIPT_SALT;
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36).toUpperCase().padStart(8,'0').slice(-8);
        };

                while (date.getMonth() === parseInt(month) - 1) {

            const calculateCarryForward = (memberId, upToMonthKey) => {
                // Only carry forward from system start month onwards
                const allMonths = Object.keys(monthlyData).filter(m =>
                    m < upToMonthKey && m >= SYSTEM_START_MONTH

                let carryForward = 0;
                allMonths.forEach(m => {

                    const hasConfirmedPayments = payments.some(p => p.memberId === memberId && p.month === m && p.status === 'confirmed');
                    if (!hasActivatedMeetings && !hasConfirmedPayments) return;
                    const owed = calculateMonthlyOwing(memberObj, m, true).total;
                    const paid = payments.filter(p => p.memberId === memberId && p.month === m && p.status === 'confirmed')
                        .reduce((s,p) => s + (p.amount||0), 0);

            const calculateMonthlyOwing = (member, monthKey, skipCarry = false) => {
                // Passed out members owe nothing

                const data = getMonthData(monthKey);

                let total = 0;
                const breakdown = { dues: settings.monthlyDues, lateness: 0, missedMeetings: 0, missedSensitization: 0 };

                total += settings.monthlyDues;

                // Get Wednesdays for this month to check exemptions on specific meeting dates
                const _weds = getWednesdaysInMonth(monthKey);
                const _weekDates = {};
                _weds.slice(1, -1).forEach((w, idx) => { _weekDates['week' + (idx+2)] = localDateStr(w); });
                if (_weds.length > 0) _weekDates['sensitization'] = data.sensitizationDate ? String(data.sensitizationDate).split('T')[0] : localDateStr(_weds[_weds.length-1]);

                    const meetingHeld = data.meetingsHeld && data.meetingsHeld[week];

                    const mDate = _weekDates[week];
                    // Check exemption on the actual meeting date (not just today)
                    const exemptOnDate = mDate ? wasMemberExemptOn(member.id, mDate) : hasActiveExemption;
                    const latePermOnDate = mDate && exemptionRequests.some(r =>
                        r.memberId === member.id && r.status === 'approved' && r.reasonKey === 'late_permission' &&
                        r.startDate && r.endDate && toDateStr(r.startDate) <= toDateStr(mDate) && toDateStr(r.endDate) >= toDateStr(mDate));
                    if (meetingHeld && !isCancelled && !exemptOnDate) {
                        if (data.lateness && data.lateness[week] && data.lateness[week][member.id] && !latePermOnDate) {
                            breakdown.lateness += settings.latenessFine;
                            total += settings.latenessFine;
                        }
                        if (data.meetings && data.meetings[week] && !data.meetings[week][member.id]) {
                            breakdown.missedMeetings += settings.missedMeetingFine;
                            total += settings.missedMeetingFine;
                        }
                    }
                });
                const sensitizationHeld = data.meetingsHeld && data.meetingsHeld.sensitization;
                const sensCancelled = data.cancelled && data.cancelled.sensitization;
                const sensDate = _weekDates['sensitization'];
                const exemptOnSens = sensDate ? wasMemberExemptOn(member.id, sensDate) : hasActiveExemption;
                if (sensitizationHeld && !sensCancelled && !exemptOnSens) {
                    if (!data.sensitization || !data.sensitization[member.id]) {
                        breakdown.missedSensitization += settings.missedSensitizationFine;
                        total += settings.missedSensitizationFine;
                    }
                }

                // Add carry-forward from previous months (unless we're computing carry itself)
                const carryForward = skipCarry ? 0 : calculateCarryForward(member.id, monthKey);
                total += carryForward;
                return { total, breakdown, isExempted: hasActiveExemption, exemptions, carryForward };
            };

                const [selectedMemberId, setSelectedMemberId] = React.useState('');
                const [form, setForm] = React.useState({ amount: '', covers: { dues: false, lateness: false, missedMeeting: false, missedSensitization: false } });

                const [payMode, setPayMode] = React.useState('current'); // 'current' | 'arrears' | 'future'
                const [selectedArrearMonths, setSelectedArrearMonths] = React.useState({});
                const [selectedFutureMonths, setSelectedFutureMonths] = React.useState({});
                const [arrearsData, setArrearsData] = React.useState({}); // { monthKey: owing }
                const [arrearsLoading, setArrearsLoading] = React.useState(false);

                if (!showRecordPayment) return null;

                const isSelfReport = userRole === 'member';
                const markerName = userRole === 'president' ? (presidentProfile?.name || 'President') : currentUser?.name;
                const targetMember = isSelfReport ? currentUser : (paymentMember || members.find(m => m.id === selectedMemberId));
                const selectedMember = targetMember;
                const selectedOwing = selectedMember ? calculateMonthlyOwing(selectedMember, currentMonth) : null;
                const alreadyPaid = selectedMember ? getMemberAmountPaid(selectedMember.id) : 0;
                const monthName = new Date(currentMonth + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                // Load arrears when member selected and mode = arrears
                const loadArrears = async (memberId) => {
                    if (!memberId) return;
                    setArrearsLoading(true);
                    const now = new Date();
                    const result = {};
                    for (let i = 1; i <= 6; i++) {
                        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                        const mk = d.toISOString().slice(0, 7);
                        const snap = await db.collection('payments').doc(mk).collection('records')
                            .where('memberId', '==', memberId).where('status', '==', 'confirmed').get();
                        const paidAmt = snap.docs.reduce((s, doc) => s + (doc.data().amount || 0), 0);
                        const mem = members.find(m => m.id === memberId);
                        if (mem) {
                            const owing = calculateMonthlyOwing(mem, mk);
                            const balance = Math.max(0, owing.total - paidAmt);
                            if (balance > 0) result[mk] = { owing: owing.total, paid: paidAmt, balance };
                        }
                    }
                    setArrearsData(result);
                    setArrearsLoading(false);
                };

                const handleMemberChange = (id) => {
                    setSelectedMemberId(id);
                    setArrearsData({});
                    setSelectedArrearMonths({});
                    setSelectedFutureMonths({});
                    if (id && payMode === 'arrears') loadArrears(id);
                };

                const handleModeChange = (mode) => {
                    setPayMode(mode);
                    setSelectedArrearMonths({});
                    setSelectedFutureMonths({});
                    if (mode === 'arrears' && selectedMember) loadArrears(selectedMember.id);
                };

                const futureMonths = getFutureMonths(10).filter(mk => mk > currentMonth);

                const handleSave = async () => {
                    if (!selectedMember) { alert('Please select a member.'); return; }

                    if (payMode === 'current') {
                        if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) { alert('Please enter a valid amount.'); return; }
                        const coversItems = Object.entries(form.covers).filter(([,v]) => v)
                            .map(([k]) => k === 'dues' ? 'Monthly Dues' : k === 'lateness' ? 'Lateness Fine' : k === 'missedMeeting' ? 'Missed Meeting Fine' : 'Missed Sensitization Fine');
                        if (coversItems.length === 0) { alert('Please select what this payment covers.'); return; }
                        const autoConfirm = userRole === 'president' || userRole === 'treasurer';
                        setSaving(true);
                        const payment = await savePayment(selectedMember.id, selectedMember.name, Number(form.amount), coversItems, markerName, currentMonth, autoConfirm);
                        if (!autoConfirm) await sendRoleNotification(['treasurer','financialSecretary'], 'New Payment Submitted', selectedMember.name + ' submitted N' + Number(form.amount).toLocaleString() + ' for confirmation. Receipt: ' + (payment.receiptNumber||''));

                        setShowRecordPayment(false);
                        setPaymentMember(null);
                        setShowReceipt(payment);

                    } else if (payMode === 'arrears') {
                        const months = Object.keys(selectedArrearMonths).filter(mk => selectedArrearMonths[mk]);
                        if (months.length === 0) { alert('Please select at least one month to clear.'); return; }
                        setSaving(true);
                        let lastPayment = null;
                        for (const mk of months) {
                            const d = arrearsData[mk];

                                lastPayment = await savePayment(selectedMember.id, selectedMember.name, d.balance, ['Monthly Dues (Arrears - ' + getMonthLabel(mk) + ')'], markerName, mk, true);

                        }
                        setSaving(false);
                        setShowRecordPayment(false);
                        setPaymentMember(null);
                        if (lastPayment) setShowReceipt(lastPayment);
                        alert('Arrears recorded for ' + months.length + ' month(s)!');

                    } else if (payMode === 'future') {
                        const months = Object.keys(selectedFutureMonths).filter(mk => selectedFutureMonths[mk]);
                        if (months.length === 0) { alert('Please select at least one future month.'); return; }
                        setSaving(true);
                        const savedPayments = [];
                        for (const mk of months) {
                            const duesAmt = settings.monthlyDues || 1000;
                            const pmt = await savePayment(selectedMember.id, selectedMember.name, duesAmt, ['Monthly Dues (Advance - ' + getMonthLabel(mk) + ')'], markerName, mk, true);
                            savedPayments.push(pmt);
                        }
                        setSaving(false);
                        setShowRecordPayment(false);
                        setPaymentMember(null);
                        // Show receipt for the last payment (or first if only one)
                        if (savedPayments.length > 0) setShowReceipt(savedPayments[savedPayments.length - 1]);
                        // Generate PDF for all months
                        if (savedPayments.length === 1) {
                            setTimeout(() => generateReceiptPDF(savedPayments[0], selectedMember), 500);

                                        {selectedOwing && (
                                            <div className="flex gap-2 mt-1.5 flex-wrap">
                                                <button onClick={() => setForm({...form, amount: String(selectedOwing.breakdown.dues)})}

                                                    Dues only N{selectedOwing.breakdown.dues.toLocaleString()}
                                                </button>
                                                {selectedOwing.total > selectedOwing.breakdown.dues && (
                                                    <button onClick={() => setForm({...form, amount: String(selectedOwing.total - alreadyPaid)})}
                                                        className="text-xs px-2 py-1 bg-green-50 text-green-600 rounded-lg border border-green-200">
                                                        Full balance N{(selectedOwing.total - alreadyPaid).toLocaleString()}
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">What does this cover? *</label>
                                        <div className="space-y-2">
                                            {[
                                                { key: 'dues', label: 'Monthly Dues', amount: selectedOwing?.breakdown.dues },
                                                { key: 'lateness', label: 'Lateness Fine', amount: selectedOwing?.breakdown.lateness },
                                                { key: 'missedMeeting', label: 'Missed Meeting Fine', amount: selectedOwing?.breakdown.missedMeetings },
                                                { key: 'missedSensitization', label: 'Missed Sensitization Fine', amount: selectedOwing?.breakdown.missedSensitization }
                                            ].filter(item => !item.amount || item.amount > 0 || item.key === 'dues').map(item => (
                                                <label key={item.key} className={`flex items-center gap-3 p-2.5 rounded-xl border-2 cursor-pointer transition ${form.covers[item.key] ? 'border-green-400 bg-green-50' : 'border-gray-200 bg-gray-50'}`}>
                                                    <input type="checkbox" checked={form.covers[item.key]}
                                                        onChange={e => setForm({...form, covers: {...form.covers, [item.key]: e.target.checked}})}

                                                    <span className="text-sm font-medium flex-1">{item.label}</span>

                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ── ARREARS ── */}
                            {payMode === 'arrears' && selectedMember && (
                                <div className="mb-4">
                                    <p className="text-xs text-gray-500 mb-3">Select months with outstanding balance to clear:</p>

                                        <p className="text-center text-gray-400 py-4">Loading arrears...</p>

                                        <div className="text-center py-6 bg-green-50 rounded-xl border border-green-200">
                                            <p className="text-2xl mb-1">✅</p>

                                            <p className="text-xs text-green-500 mt-1">All previous months are cleared</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            {Object.entries(arrearsData).sort(([a],[b]) => a.localeCompare(b)).map(([mk, d]) => (

                                                        className="w-4 h-4 accent-green-600" />
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-sm">{getMonthLabel(mk)}</p>
                                                        <p className="text-xs text-gray-500">Owing N{d.owing.toLocaleString()} · Paid N{d.paid.toLocaleString()}</p>

                                                    <span className="font-semibold text-sm">Total to Collect</span>

                                                <span className="text-blue-600 font-bold text-sm">N{(settings.monthlyDues||1000).toLocaleString()}</span>
                                            </label>

                                    {totalFuture > 0 && (
                                        <div className="bg-blue-600 text-white rounded-xl p-3 flex justify-between items-center mt-3">
                                            <span className="font-semibold text-sm">Total to Collect</span>
                                            <span className="font-bold text-lg">N{totalFuture.toLocaleString()}</span>

            };


            const ReceiptModal = () => {
                const [receiptStage, setReceiptStage] = React.useState('initial');
                if (!showReceipt) return null;
                const p = showReceipt;
                const dateStr = new Date(p.date).toLocaleString('en-NG', {
                    day: '2-digit', month: 'long', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const monthName = new Date(p.month + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                return (
                    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden">
                            {/* Close button */}
                            <div className="flex justify-end px-4 pt-3 pb-0">
                                <button onClick={() => { setShowReceipt(null); setReceiptStage('initial'); }}
                                    className="text-gray-400 hover:text-gray-600 text-2xl leading-none font-bold">&times;</button>
                            </div>
                            {/* Receipt header */}
                            <div className="bg-green-700 text-white text-center py-4 px-4">
                                <div className="flex justify-center mb-2"><LogoPair size={40} /></div>
                                <h2 className="text-base font-bold">CHARITY & GENDER CDS</h2>
                                <p className="text-green-200 text-xs">Aba North LGA • NYSC</p>
                                <p className="text-white/80 text-xs mt-1">PAYMENT RECEIPT</p>
                            </div>

                            {/* Receipt body */}
                            <div className="p-5 space-y-3">
                                <div className="text-center">
                                    <p className="text-xs text-gray-400 uppercase tracking-wider">Receipt No.</p>
                                    <p className="text-lg font-bold font-mono text-green-700">{p.receiptNumber}</p>
                                </div>

                                <div className="border-t border-dashed border-gray-200 pt-3 space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Member:</span>
                                        <span className="font-bold text-right">{p.memberName}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Month:</span>
                                        <span className="font-medium">{monthName}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Date:</span>
                                        <span className="font-medium text-right text-xs">{dateStr}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Recorded by:</span>
                                        <span className="font-medium">{p.markedBy}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Covers:</span>
                                        <span className="font-medium text-right text-xs">{Array.isArray(p.covers) ? p.covers.join(', ') : p.covers}</span>
                                    </div>
                                </div>

                                <div className="bg-green-50 border-2 border-green-400 rounded-xl p-3 text-center">
                                    <p className="text-xs text-gray-500 mb-0.5">Amount Paid</p>
                                    <p className="text-3xl font-bold text-green-700">₦{Number(p.amount).toLocaleString()}</p>
                                </div>

                                {p.status === 'confirmed' && p.confirmedBy && (
                                    <div className="bg-green-100 rounded-xl p-3 text-center">
                                        <p className="text-xs font-bold text-green-800">✅ PAYMENT CONFIRMED</p>
                                        <p className="text-xs text-green-600">By {p.confirmedBy} on {p.confirmedDate ? new Date(p.confirmedDate).toLocaleDateString() : ''}</p>
                                    </div>
                                )}
                                {p.status !== 'confirmed' && (
                                    <p className="text-center text-xs text-gray-400 italic">Screenshot this receipt for your records</p>
                                )}
                            </div>

                            <div className="px-5 pb-5 space-y-2">
                                {p.status === "confirmed" && (
                                    <div className="space-y-2">
                                        {/* Button 1: Download */}
                                        <button onClick={() => {
                                            const memberObj = members.find(m => m.id === p.memberId) || currentUser;
                                            generateReceiptPDF(p, memberObj);
                                        }} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm">
                                            📥 Download Receipt to Device
                                        </button>
                                        {/* Button 2: WhatsApp */}
                                        {(() => {
                                            const mo = members.find(m => m.id === p.memberId);
                                            const ph = mo?.phone ? mo.phone.replace(/[^0-9]/g,"").replace(/^0/,"234") : null;
                                            const msg = "Hi " + (mo?.name||p.memberName||"").split(" ")[0] + "," +
                                                "\n\nYour CDS payment receipt is ready." +
                                                "\n\nReceipt No: " + (p.receiptNumber||"") +
                                                "\nAmount: N" + Number(p.amount||0).toLocaleString() +
                                                "\nMonth: " + new Date((p.month||currentMonth)+"-01").toLocaleDateString("en-NG",{month:"long",year:"numeric"}) +
                                                "\nConfirmed by: " + (p.confirmedBy||p.markedBy||"Treasurer") +
                                                "\n\nPlease open the receipt file sent to you." +
                                                "\n\n- Charity & Gender CDS, Aba North LGA";
                                            return ph ? (
                                                <button onClick={() => window.open("https://wa.me/"+ph+"?text="+encodeURIComponent(msg),"_blank")}
                                                    className="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold text-sm">
                                                    📲 Send WhatsApp to {mo?.name?.split(" ")[0] || "Member"}
                                                </button>
                                            ) : (
                                                <p className="text-xs text-gray-400 text-center italic">No phone number saved for this member</p>

                                        })()}
                                        {/* Button 3: Mark as Sent */}
                                        <button onClick={() => { setShowReceipt(null); setReceiptStage("initial"); }}
                                            className="w-full py-2.5 bg-gray-700 hover:bg-gray-800 text-white rounded-xl font-semibold text-sm">
                                            ✅ Done — Close Receipt
                                        </button>
                                    </div>
                                )}
                                {p.status !== "confirmed" && (
                                    <button onClick={() => setShowReceipt(null)}
                                        className="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold text-sm">
                                        Done ✓
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };


            // ══════════════════════════════════════════
            // REQUEST EXEMPTION MODAL (Member side)
            // ══════════════════════════════════════════
            const RequestExemptionModal = () => {
                if (!showRequestExemption) return null;
                const [form, setForm] = React.useState({
                    reasonKey: '', description: '', requestedDuration: '', startDate: new Date().toISOString().split('T')[0]
                });
                const [saving, setSaving] = React.useState(false);

                const selectedReason = EXEMPTION_REASONS.find(r => r.key === form.reasonKey);

                const handleSubmit = async () => {
                    if (!form.reasonKey) { alert('Please select a reason.'); return; }
                    if (!form.description.trim()) { alert('Please describe your situation.'); return; }
                    if (!form.startDate) { alert('Please select a start date.'); return; }

                    setSaving(true);
                    await db.collection('exemptionRequests').add({
                        memberId: currentUser.id,
                        memberName: currentUser.name,
                        memberBatch: currentUser.batch,
                        reasonKey: form.reasonKey,
                        reasonLabel: selectedReason?.label || form.reasonKey,
                        description: form.description.trim(),
                        requestedDuration: form.requestedDuration.trim(),
                        startDate: form.startDate,
                        endDate: null,
                        status: 'pending',
                        submittedDate: new Date().toISOString(),
                        presidentNote: null
                    });
                    await sendRoleNotification(['president'], 'Exemption Request', (currentUser ? currentUser.name : 'A member') + ' submitted an exemption request. Please review.');
                    setSaving(false);
                    setShowRequestExemption(false);
                    alert('✅ Exemption request submitted! The President will review it shortly.');
                };

                // Check if already has pending request
                const hasPending = exemptionRequests.some(r => r.memberId === currentUser?.id && r.status === 'pending');
                const isRestricted = !!(currentUser?.exemptionRestricted);

                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-5 max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h2 className="text-lg font-bold">📋 Request Exemption</h2>
                                    <p className="text-xs text-gray-400 mt-0.5">Subject to President approval</p>
                                </div>
                                <button onClick={() => setShowRequestExemption(false)} className="text-gray-400 hover:text-gray-700 text-2xl">&times;</button>
                            </div>

                            {isRestricted ? (
                                <div className="text-center py-6">
                                    <p className="text-4xl mb-3">🚫</p>
                                    <p className="font-bold text-red-700">Exemption Requests Restricted</p>
                                    <p className="text-sm text-gray-500 mt-2">You are currently restricted from submitting exemption requests.</p>
                                    <p className="text-sm text-gray-500 mt-1">Please contact the President directly.</p>
                                    {currentUser?.exemptionRestrictedReason && (
                                        <div className="mt-3 bg-red-50 rounded-xl p-3 text-xs text-red-700">
                                            Reason: {currentUser.exemptionRestrictedReason}
                                        </div>
                                    )}
                                    <button onClick={() => setShowRequestExemption(false)} className="mt-4 px-6 py-2 bg-gray-200 rounded-xl font-medium">Close</button>
                                </div>
                            ) : cooldown.onCooldown ? (
                                <div className="text-center py-6">
                                    <p className="text-4xl mb-3">⏰</p>
                                    <p className="font-bold text-orange-700">Cooldown Period Active</p>
                                    <p className="text-sm text-gray-600 mt-2">
                                        Your last exemption lasted more than {cooldown.durationDays <= 30 ? '1 week' : cooldown.durationDays <= 60 ? '1 month' : '2 months'}.
                                    </p>
                                    <p className="text-sm text-gray-600 mt-1">
                                        You cannot submit a new request for <strong>{cooldown.cooldownLabel}</strong> after your last exemption ended.
                                    </p>
                                    <div className="mt-3 bg-orange-50 border border-orange-200 rounded-xl p-3">
                                        <p className="text-xs text-orange-700 font-medium">You can request again from:</p>
                                        <p className="text-base font-bold text-orange-800 mt-1">
                                            {new Date(cooldown.cooldownEnds).toLocaleDateString('en-NG', { day: 'numeric', month: 'long', year: 'numeric' })}
                                        </p>
                                    </div>
                                    <button onClick={() => setShowRequestExemption(false)} className="mt-4 px-6 py-2 bg-gray-200 rounded-xl font-medium">Close</button>
                                </div>
                            ) : hasPending ? (
                                <div className="text-center py-6">
                                    <p className="text-4xl mb-3">⏳</p>
                                    <p className="font-bold text-gray-700">You have a pending request</p>
                                    <p className="text-sm text-gray-500 mt-1">Please wait for the President to review your existing request before submitting a new one.</p>
                                    <button onClick={() => setShowRequestExemption(false)} className="mt-4 px-6 py-2 bg-gray-200 rounded-xl font-medium">Close</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Reason *</label>
                                        <select value={form.reasonKey} onChange={e => setForm({...form, reasonKey: e.target.value})}
                                            className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50">
                                            <option value="">— Select reason —</option>
                                            {EXEMPTION_REASONS.map(r => (
                                                <option key={r.key} value={r.key}>{r.label}</option>
                                            ))}
                                        </select>
                                    </div>

                                    {selectedReason && (
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">
                                                {selectedReason.hint} *
                                            </label>
                                            <textarea
                                                value={form.description}
                                                onChange={e => setForm({...form, description: e.target.value})}
                                                placeholder="Please provide details..."
                                                rows={3}
                                                className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50 resize-none"
                                            />
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Start Date *</label>
                                            <input type="date" value={form.startDate}
                                                onChange={e => setForm({...form, startDate: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Requested Duration</label>
                                            <input type="text" placeholder="e.g. 2 weeks"
                                                value={form.requestedDuration}
                                                onChange={e => setForm({...form, requestedDuration: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50"
                                            />
                                        </div>
                                    </div>

                                    <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-xs text-yellow-800">
                                        ⚠️ The President will determine the approved duration. Your request may be approved for a different period than requested.
                                    </div>

                                    <button onClick={handleSubmit} disabled={saving}
                                        className="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold disabled:opacity-50">
                                        {saving ? 'Submitting...' : '📤 Submit Request'}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ══════════════════════════════════════════
            // REVIEW EXEMPTION MODAL (President side)
            // ══════════════════════════════════════════
            const ReviewExemptionModal = () => {
                if (!reviewingRequest) return null;
                const req = reviewingRequest;
                const [endDate, setEndDate] = React.useState('');
                const [note, setNote] = React.useState('');
                const [saving, setSaving] = React.useState(false);

                const DURATION_PRESETS = {
                    medical: ['2 weeks','1 month','2 months','3 months','as needed'],
                    ppa_travel: ['2 weeks','1 month','2 months'],
                    accommodation: ['1 week','2 weeks','1 month'],
                    family_emergency: ['1 week','2 weeks','1 month'],
                    bereavement: ['1 week','2 weeks','3 weeks','4 weeks'],
                    other: ['1 week','2 weeks','1 month','2 months']
                };

                const addDays = (start, days) => {
                    const d = new Date(start);
                    d.setDate(d.getDate() + days);
                    return d.toISOString().split('T')[0];
                };

                const durationToEndDate = (dur, start) => {
                    const map = {'1 week':7,'2 weeks':14,'3 weeks':21,'4 weeks':28,'1 month':30,'2 months':60,'3 months':90,'as needed':365};
                    return map[dur] ? addDays(start || req.startDate, map[dur]) : null;
                };

                const handleApprove = async () => {
                    if (!endDate) { alert('Please set an end date for the exemption.'); return; }
                    if (!note.trim()) { alert('Please add a note for the member.'); return; }
                    setSaving(true);
                    await db.collection('exemptionRequests').doc(req.id).set({
                        status: 'approved',
                        endDate,
                        presidentNote: note.trim(),
                        reviewedDate: new Date().toISOString(),
                        reviewedBy: presidentProfile?.name || 'President'
                    }, { merge: true });
                    setSaving(false);
                    setReviewingRequest(null);
                    alert(`✅ Exemption approved for ${req.memberName}`);
                };

                const handleReject = async () => {
                    if (!note.trim()) { alert('Please provide a reason for rejection.'); return; }
                    setSaving(true);
                    await db.collection('exemptionRequests').doc(req.id).set({
                        status: 'rejected',
                        presidentNote: note.trim(),
                        reviewedDate: new Date().toISOString(),
                        reviewedBy: presidentProfile?.name || 'President'
                    }, { merge: true });
                    setSaving(false);
                    setReviewingRequest(null);
                    alert(`❌ Exemption rejected for ${req.memberName}`);
                };

                const presets = DURATION_PRESETS[req.reasonKey] || DURATION_PRESETS.other;

                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-5 max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h2 className="text-lg font-bold">📋 Review Exemption</h2>
                                    <p className="text-xs text-gray-400 mt-0.5">President Review</p>
                                </div>
                                <button onClick={() => setReviewingRequest(null)} className="text-gray-400 hover:text-gray-700 text-2xl">&times;</button>
                            </div>

                            {/* Request details */}
                            <div className="bg-gray-50 rounded-xl p-3 mb-4 space-y-1.5 text-sm">
                                <div className="flex justify-between"><span className="text-gray-500">Member:</span><span className="font-bold">{req.memberName}</span></div>
                                <div className="flex justify-between"><span className="text-gray-500">Batch:</span><span>Batch {req.memberBatch}</span></div>
                                <div className="flex justify-between"><span className="text-gray-500">Reason:</span><span className="font-medium text-right">{req.reasonLabel}</span></div>
                                <div className="flex justify-between"><span className="text-gray-500">Start Date:</span><span>{new Date(req.startDate).toLocaleDateString()}</span></div>
                                {req.requestedDuration && (
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-500">Requested:</span>
                                        <span className="text-blue-600 font-medium">{req.requestedDuration}</span>
                                    </div>
                                )}
                                {/* Warning if request exceeds default maximum */}
                                {(() => {
                                    const reason = EXEMPTION_REASONS.find(r => r.key === req.reasonKey);
                                    if (reason?.defaultDuration) return (
                                        <div className="bg-orange-50 border border-orange-200 rounded-lg p-2 mt-1">
                                            <p className="text-xs text-orange-700">
                                                ⚠️ Default maximum for this reason: <strong>{reason.defaultDuration}</strong>
                                                {req.requestedDuration ? ' — member has requested beyond default' : ''}
                                            </p>
                                        </div>
                                    );
                                    return null;
                                })()}
                            </div>

                            <div className="bg-blue-50 rounded-xl p-3 mb-4">
                                <p className="text-xs font-semibold text-blue-700 uppercase mb-1">Member's Description:</p>
                                <p className="text-sm text-blue-900">{req.description}</p>
                            </div>

                            {/* Show cooldown that will apply after approval */}
                            {(() => {
                                const reqMember = members.find(m => m.id === req.memberId);
                                return reqMember ? (
                                    <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 mb-4 text-xs text-gray-600">
                                        <p className="font-semibold text-gray-700 mb-1">⏰ Automatic cooldown after approval:</p>
                                        <p>• ≤ 1 week approved → No cooldown</p>
                                        <p>• 1 week–1 month → 1 week cooldown</p>
                                        <p>• 1–2 months → 2 months cooldown</p>
                                        <p>• 2–3 months → 3 months cooldown</p>
                                    </div>
                                ) : null;
                            })()}

                            {/* Duration presets */}
                            <div className="mb-3">
                                <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Approved Duration</label>
                                <div className="flex flex-wrap gap-1.5 mb-2">
                                    {presets.map(d => (
                                        <button key={d} onClick={() => { const e = durationToEndDate(d, req.startDate); if(e) setEndDate(e); }}
                                            className="text-xs px-2.5 py-1 bg-blue-50 text-blue-700 rounded-lg border border-blue-200 hover:bg-blue-100">
                                            {d}
                                        </button>
                                    ))}
                                </div>
                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)}
                                    className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50"
                                    placeholder="Or pick end date manually"
                                />
                                {endDate && <p className="text-xs text-green-600 mt-1">Exemption ends: {new Date(endDate).toLocaleDateString()}</p>}
                            </div>

                            {/* Note */}
                            <div className="mb-4">
                                <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Note to Member *</label>
                                <textarea value={note} onChange={e => setNote(e.target.value)}
                                    placeholder="Add a note explaining your decision..."
                                    rows={2}
                                    className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50 resize-none"
                                />
                            </div>

                            <div className="flex gap-2">
                                <button onClick={handleApprove} disabled={saving}
                                    className="flex-1 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold text-sm disabled:opacity-50">
                                    ✅ Approve
                                </button>
                                <button onClick={handleReject} disabled={saving}
                                    className="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-sm disabled:opacity-50">
                                    ❌ Reject
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };


            // ── ADD EXPENSE MODAL ──
            const AddExpenseModal = () => {
                if (!showAddExpense) return null;
                const [grp, setGrp] = React.useState('');
                const [cat, setCat] = React.useState('');

                const isBankDed = grp === 'Bank & Finance';
                const finalDesc = cat === 'Other (describe)' ? (customDesc || 'Other') : cat;

                const handleSubmit = async () => {
                    if (!grp) { alert('Please select a category group.'); return; }
                    if (!cat) { alert('Please select a specific category.'); return; }
                    if (!amount || Number(amount) <= 0) { alert('Please enter a valid amount.'); return; }
                    setSaving(true);

                    if (isBankDed) {
                        const purseDoc = await db.collection('system').doc('purse').get();
                        const cur = purseDoc.exists ? purseDoc.data() : {};
                        const field = paidFrom === 'cashInBank' ? 'cashInBank' : 'cashAtHand';
                        await db.collection('system').doc('purse').set({
                            [field]: Math.max(0, (cur[field]||0) - Number(amount)),
                            totalExpenses: (cur.totalExpenses||0) + Number(amount),
                            lastUpdated: new Date().toISOString()
                        }, { merge: true });
                        await db.collection('expenses').add({
                            description: finalDesc, categoryGroup: grp, category: cat,
                            amount: Number(amount), paidFrom, date, note,
                            status: 'disbursed', isBankDeduction: true,
                            submittedBy: currentUser ? currentUser.name : 'Treasurer',
                            disbursedBy: 'Bank (automatic)', disbursedDate: date,
                            timestamp: Date.now()
                        });
                        await db.collection('transactions').add({
                            type: 'expense', amount: Number(amount), description: finalDesc,
                            categoryGroup: grp, paidFrom, date,
                            disbursedBy: 'Bank (automatic)', timestamp: Date.now()
                        });
                        await writeAuditLog('bank_deduction_recorded', {
                            description: finalDesc, amount: Number(amount), paidFrom, date
                        }, currentUser ? currentUser.name : 'Treasurer', 'treasurer');
                        setSaving(false);
                        setShowAddExpense(false);
                        alert('Bank charge recorded! Purse updated.');
                    } else {
                        await db.collection('expenses').add({
                            description: finalDesc, categoryGroup: grp, category: cat,
                            amount: Number(amount), paidFrom, date, note,
                            status: 'pending',
                            submittedBy: currentUser ? currentUser.name : 'Treasurer',
                            submittedDate: new Date().toISOString(),
                            timestamp: Date.now()
                        });
                        await sendRoleNotification(
                            ['president', 'financialSecretary'],
                            'Expense Submitted',
                            (currentUser ? currentUser.name : 'Treasurer') + ' submitted expense: ' + finalDesc + ' N' + Number(amount).toLocaleString()
                        );
                        setSaving(false);
                        setShowAddExpense(false);
                        alert('Expense submitted for President approval!');
                    }
                };

                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-5 max-h-screen overflow-y-auto">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h2 className="text-lg font-bold">Record Expense</h2>
                                    <p className="text-xs text-gray-400">{isBankDed ? 'Bank deduction - no approval needed' : 'Requires President approval'}</p>
                                </div>
                                <button onClick={() => setShowAddExpense(false)} className="text-gray-400 text-2xl">&times;</button>
                            </div>
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Category Group *</label>
                                    <div className="grid grid-cols-2 gap-1.5">
                                        {Object.keys(EXPENSE_CATEGORIES).map(g => (
                                            <button key={g} onClick={() => { setGrp(g); setCat(''); }}
                                                className={grp === g ? 'py-2 px-2 rounded-xl border-2 border-green-500 bg-green-50 text-green-700 text-xs font-semibold text-left' : 'py-2 px-2 rounded-xl border-2 border-gray-200 text-gray-500 text-xs text-left hover:border-gray-300'}>
                                                {g === 'Bank & Finance' ? 'Bank & Finance' :
                                                 g === 'Administrative' ? 'Administrative' :
                                                 g === 'Events & Activities' ? 'Events' :
                                                 g === 'Welfare' ? 'Welfare' :
                                                 g === 'Project' ? 'Project' : 'Other'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {grp && (
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Specific Category *</label>
                                        <select value={cat} onChange={e => setCat(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50">
                                            <option value="">-- Select --</option>
                                            {EXPENSE_CATEGORIES[grp].map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                )}
                                {cat === 'Other (describe)' && (
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Describe *</label>
                                        <input type="text" value={customDesc} onChange={e => setCustomDesc(e.target.value)}
                                            placeholder="Describe this expense..."
                                            className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50" />
                                    </div>
                                )}
                                {isBankDed && (
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
                                        <p className="text-xs font-bold text-blue-800">Bank Deduction</p>
                                        <p className="text-xs text-blue-600 mt-0.5">No president approval needed. Deducted immediately and logged in audit trail.</p>
                                    </div>
                                )}
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Amount (N) *</label>
                                    <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
                                        placeholder="0" className="w-full px-3 py-2 border rounded-xl text-lg font-bold bg-gray-50" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Paid From</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setPaidFrom('cashAtHand')}
                                            className={paidFrom === 'cashAtHand' ? 'py-2 rounded-xl border-2 border-green-500 bg-green-50 text-green-700 text-sm font-semibold' : 'py-2 rounded-xl border-2 border-gray-200 text-gray-500 text-sm'}>
                                            Cash at Hand
                                        </button>
                                        <button onClick={() => setPaidFrom('cashInBank')}
                                            className={paidFrom === 'cashInBank' ? 'py-2 rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 text-sm font-semibold' : 'py-2 rounded-xl border-2 border-gray-200 text-gray-500 text-sm'}>
                                            Bank
                                        </button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Date</label>
                                        <input type="date" value={date} onChange={e => setDate(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Note</label>
                                        <input type="text" value={note} onChange={e => setNote(e.target.value)}
                                            placeholder="Optional" className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50" />
                                    </div>
                                </div>
                                <button onClick={handleSubmit} disabled={saving}
                                    className={'w-full py-3 rounded-xl font-bold text-white ' + (saving ? 'bg-gray-400' : isBankDed ? 'bg-blue-600 hover:bg-blue-700' : 'bg-red-600 hover:bg-red-700')}>
                                    {saving ? 'Saving...' : isBankDed ? 'Record Bank Charge' : 'Submit for President Approval'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };


            // ── NOTIFICATION SETTINGS MODAL ──
            const NotificationSettingsModal = () => {
                if (!showNotifSettings) return null;
                const [prefs, setPrefs] = React.useState(loadNotifPrefs());
                const [pushStatus, setPushStatus] = React.useState(
                    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
                );
                const doSave = () => { saveNotifPrefs(prefs); setNotifPrefs(prefs); setShowNotifSettings(false); };
                const doRequestPush = async () => {
                    if (typeof Notification === 'undefined') { alert('Push not supported on this browser.'); return; }
                    const perm = await Notification.requestPermission();
                    setPushStatus(perm);
                    if (perm === 'granted') { setPrefs({...prefs, push: true}); showLocalPush('CDS Tracker', 'Push notifications enabled!'); }
                    else alert('Denied. Enable notifications in your browser settings for this site.');
                };
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-5 max-h-screen overflow-y-auto">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h2 className="text-lg font-bold">Notification Settings</h2>
                                    <p className="text-xs text-gray-400">How you want to be alerted</p>
                                </div>
                                <button onClick={() => setShowNotifSettings(false)} className="text-gray-400 text-2xl">&times;</button>
                            </div>
                            <div className="space-y-4">
                                <div className="bg-green-50 border border-green-200 rounded-xl p-3 flex justify-between items-center">
                                    <div>
                                        <p className="font-semibold text-sm text-green-800">In-App Alerts</p>
                                        <p className="text-xs text-green-600">Badge shown when you open the app</p>
                                    </div>
                                    <span className="text-xs bg-green-200 text-green-800 px-2 py-1 rounded-full font-bold">Always On</span>
                                </div>
                                <div className="border rounded-xl p-4 space-y-3">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold text-sm">WhatsApp Alerts</p>
                                            <p className="text-xs text-gray-500">Opens WhatsApp to notify you</p>
                                        </div>
                                        <button onClick={() => setPrefs({...prefs, whatsApp: !prefs.whatsApp})}
                                            className={prefs.whatsApp ? 'w-12 h-6 rounded-full bg-green-500 relative' : 'w-12 h-6 rounded-full bg-gray-300 relative'}>
                                            <span className={prefs.whatsApp ? 'absolute right-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow' : 'absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow'}></span>
                                        </button>

                                    {prefs.whatsApp && (
                                        <div className="space-y-2">
                                            <p className="text-xs font-semibold text-gray-500 uppercase">Your WhatsApp Number</p>
                                            <input type="tel" placeholder="e.g. 2348012345678"
                                                value={prefs.whatsAppNumber || ''}
                                                onChange={e => setPrefs({...prefs, whatsAppNumber: e.target.value})}
                                                className="w-full px-3 py-2 border rounded-xl text-sm bg-gray-50" />
                                            <p className="text-xs text-gray-400">International format: 234 + number (no spaces)</p>
                                            <button onClick={() => {
                                                if (!prefs.whatsAppNumber) { alert('Enter your number first.'); return; }
                                                const n = prefs.whatsAppNumber.replace(/[^0-9]/g,'');
                                                window.open('https://wa.me/' + n + '?text=' + encodeURIComponent('CDS Tracker test: Notifications are set up!'), '_blank');
                                            }} className="w-full py-2 border border-green-300 text-green-700 rounded-xl text-sm font-medium">
                                                Send Test Message
                                            </button>
                                        </div>
                                    )}
                                </div>
                                <div className="border rounded-xl p-4 space-y-3">
                                    <div className="flex justify-between items-center">

                                            <p className="font-semibold text-sm">Push Notifications</p>
                                            <p className="text-xs text-gray-500">Phone alert even when app is closed</p>

                                            {pushStatus === 'granted' ? 'Enabled' : pushStatus === 'denied' ? 'Blocked' : 'Not Enabled'}

                                                const ua = navigator.userAgent;
                                                if (/android/i.test(ua)) {
                                                    alert('On Android Chrome:\n1. Tap the lock icon in the address bar\n2. Tap Site settings\n3. Set Notifications to Allow\n4. Come back and try again.');
                                                } else if (/iphone|ipad/i.test(ua)) {
                                                    alert('On iPhone/iPad:\n1. Open Settings app\n2. Scroll to Safari\n3. Tap Notifications\n4. Enable for this site\n\nNote: iOS requires installing the app to home screen first for push notifications.');
                                                } else {
                                                    window.open('chrome://settings/content/notifications', '_blank') ||
                                                    alert('Open your browser settings:\nSettings > Privacy & Security > Site Settings > Notifications\nFind this site and set to Allow.');
                                                }
                                            }} className="w-full py-2 bg-orange-100 text-orange-700 border border-orange-300 rounded-xl text-xs font-semibold">
                                                How to Enable in Settings
                                            </button>
                                        </div>

                                    {pushStatus === 'granted' && (
                                        <button onClick={() => showLocalPush('CDS Tracker', 'Test push notification!')}
                                            className="w-full py-2 border border-blue-300 text-blue-700 rounded-xl text-sm">
                                            Send Test Notification
                                        </button>
                                    )}
                                </div>
                                <button onClick={doSave} className="w-full py-3 bg-green-600 text-white rounded-xl font-bold">Save Preferences</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // ── NOTIFICATIONS PANEL ──
            const NotificationsPanel = ({ role }) => {
                if (!showNotifPanel) return null;
                const myNotifs = notifications.filter(n => n.roles && (n.roles.includes(role) || n.roles.includes('all'))).slice(0, 20);
                const unread = myNotifs.filter(n => !n.read).length;
                const markAllRead = async () => {
                    const batch = db.batch();
                    myNotifs.filter(n => !n.read).forEach(n => { batch.update(db.collection('notifications').doc(n.id), { read: true }); });
                    await batch.commit();
                };
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-end justify-center z-50 p-4 sm:items-center">

                                    <h2 className="text-lg font-bold">Notifications</h2>

            const MeetingReminderModal = () => {
                if (!showMeetingReminder || !upcomingMeetingReminder) return null;

            // ── VERIFY RECEIPT MODAL ──
            const VerifyReceiptModal = () => {
                const [code, setCode] = React.useState('');
                const [checking, setChecking] = React.useState(false);
                const [result, setResult] = React.useState(null);
                if (!showVerifyReceipt) return null;
                const doVerify = async () => {
                    if (!code.trim()) { alert('Enter the verification code from the receipt.'); return; }
                    setChecking(true);
                    setResult(null);
                    try {
                        const parts = code.trim().toUpperCase().split('-');
                        if (parts.length < 2) { setResult({ valid: false, reason: 'Invalid code format.' }); setChecking(false); return; }
                        const hash = parts[parts.length - 1];
                        const receiptNum = parts.slice(0, -1).join('-');
                        const now = new Date();
                        let found = null;
                        for (let i = 0; i < 12 && !found; i++) {
                            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                            const month = d.toISOString().slice(0,7);
                            const snap = await db.collection('payments').doc(month).collection('records')
                                .where('receiptNumber', '==', receiptNum).limit(1).get();
                            if (!snap.empty) found = { ...snap.docs[0].data(), id: snap.docs[0].id };
                        }
                        if (!found) { setResult({ valid: false, reason: 'Receipt not found in records.' }); }
                        else if (found.status !== 'confirmed') { setResult({ valid: false, reason: 'Payment was not confirmed.' }); }
                        else {
                            const expected = generateReceiptHash(found.receiptNumber, found.memberId, found.amount, found.confirmedDate, found.confirmedBy);
                            if (hash === expected || hash === (found.securityHash || '')) {
                                setResult({ valid: true, payment: found });
                            } else {
                                setResult({ valid: false, reason: 'Security hash mismatch. Receipt may have been altered.' });
                            }
                        }
                    } catch(e) { setResult({ valid: false, reason: 'Error: ' + e.message }); }
                    setChecking(false);
                };
                return (
                    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">

                            <div className="flex justify-between items-center mb-4">

                            </div>
                            <div className="space-y-3">
                                <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())}
                                    placeholder="e.g. CG-2026-0042-A1B2C3D4"
                                    className="w-full px-3 py-2 border rounded-xl text-sm font-mono bg-gray-50" />
                                <p className="text-xs text-gray-400">Enter the verification code from the receipt security section</p>
                                <button onClick={doVerify} disabled={checking || !code.trim()}
                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold disabled:opacity-50">
                                    {checking ? 'Checking...' : 'Verify Receipt'}
                                </button>
                                {result && (
                                    <div className={result.valid ? 'bg-green-50 border-2 border-green-400 rounded-xl p-4' : 'bg-red-50 border-2 border-red-400 rounded-xl p-4'}>
                                        {result.valid ? (
                                            <div>
                                                <p className="font-bold text-green-800 mb-3">✅ Receipt Verified</p>
                                                <div className="space-y-1 text-sm">
                                                    <div className="flex justify-between"><span className="text-gray-500">Member:</span><span className="font-semibold">{result.payment.memberName}</span></div>

                                                <p className="text-xs text-red-600 mt-1">Do not accept this receipt.</p>

                const [saving, setSaving] = React.useState(false);

                    if (!newVal || isNaN(Number(newVal)) || Number(newVal) < 0) { alert('Enter a valid amount.'); return; }
                    if (!reason.trim()) { alert('A reason is required.'); return; }
                    setSaving(true);
                    const before = curVal;
                    const after = Number(newVal);
                    const by = currentUser ? currentUser.name : 'Treasurer';
                    if (isLarge) {
                        await db.collection('purseAdjustments').add({
                            field, fieldLabel, before, after,
                            difference: after - before,
                            reason: reason.trim(), submittedBy: by,
                            submittedDate: new Date().toISOString(),
                            status: 'pending', timestamp: Date.now()

                        setShowPurseEdit(false);

            const TransferPresidencyModal = () => {

                const [selectedId, setSelectedId] = React.useState('');

                const selectedMember = members.find(m => m.id === selectedId);

                const handleTransfer = async () => {
                    if (!confirmPassword) { alert('Please enter your password to confirm.'); return; }
                    if (confirmPassword !== presidentProfile.password) {
                        alert('❌ Wrong password. Transfer cancelled.'); return;
                    }

                    const confirmed = window.confirm(
                        `⚠️ TRANSFER PRESIDENCY\n\n` +
                        `You are about to hand over presidency to:\n` +
                        `${selectedMember.name} (Batch ${selectedMember.batch})\n\n` +
                        `• You will lose all president powers immediately\n` +
                        `• You will remain a regular member\n` +
                        `• The new president logs in normally with their phone digits\n` +
                        `• They will be prompted to create a president password\n\n` +
                        `Are you absolutely sure?`
                    );
                    if (!confirmed) return;

                    setSaving(true);
                    try {
                        const recoveryCode = generateRecoveryCode();

                        // Save new president profile using existing member details
                        await db.collection('system').doc('president').set({
                            name: selectedMember.name,
                            batch: selectedMember.batch,
                            stateCode: selectedMember.stateCode,
                            phone: selectedMember.phone,
                            year: selectedMember.year,
                            memberId: selectedMember.id,
                            password: null,           // new president sets this on first login
                            recoveryCode,
                            setupDate: new Date().toISOString(),
                            transferredFrom: presidentProfile.name,
                            transferDate: new Date().toISOString()
                        });

                        // Demote old president in their member record
                        const oldPresidentMember = members.find(m =>
                            m.batch === presidentProfile.batch &&
                            m.stateCode === presidentProfile.stateCode
                        );
                        if (oldPresidentMember) {
                            await db.collection('members').doc(oldPresidentMember.id).set(
                                { isPresident: false }, { merge: true }
                            );
                        }

                        // Mark new president in member record
                        await db.collection('members').doc(selectedMember.id).set(
                            { isPresident: true }, { merge: true }
                        );

                        setSaving(false);
                        alert(
                            `✅ Presidency transferred to ${selectedMember.name}!\n\n` +
                            `🔑 Their Recovery Code:\n${recoveryCode}\n\n` +
                            `⚠️ Share this with them privately and ask them to write it down.\n\n` +
                            `They can now log in with their normal last 4 phone digits.\n` +
                            `They will be asked to create a president password on first login.`

                        handleLogout();

                        alert('❌ Error: ' + err.message);

                                <button onClick={() => setShowTransfer(false)} className="text-gray-400 hover:text-gray-700 text-2xl">&times;</button>
                            </div>

                            <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700 mb-5">

                            {step === 1 && (

                                            <p className="text-blue-600">Batch {selectedMember.batch} • {selectedMember.stateCode} • {selectedMember.phone}</p>

                                        Next — Confirm Transfer →

                                            {assigned && <p className="text-xs text-green-700 mt-1.5 ml-1">✓ {assigned.name} • {assigned.username} {assigned.execPassword ? '' : '⚠️ No password set yet'}</p>}

        // Error boundary to show errors instead of blank screen
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', {style:{padding:'20px',fontFamily:'monospace',color:'red'}},
                        React.createElement('h2', null, 'App Error'),
                        React.createElement('pre', {style:{whiteSpace:'pre-wrap',fontSize:'12px'}},
                            this.state.error ? this.state.error.toString() : 'Unknown error'
                        )
                    );
                }
                return this.props.children;
            }
        }

    <script>
        var _dp = null;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            _dp = e;
            setTimeout(function() {
                var b = document.getElementById('pwa-install-banner');
                if (b && _dp) b.style.display = 'flex';
            }, 3000);
        });
        function installPWA() {
            if (_dp) {
                _dp.prompt();
                _dp.userChoice.then(function() {
                    _dp = null;
                    var b = document.getElementById('pwa-install-banner');
                    if (b) b.style.display = 'none';
                });
            }
        }
        window.addEventListener('appinstalled', function() {
            var b = document.getElementById('pwa-install-banner');
            if (b) b.style.display = 'none';
        });
